---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  IMAGE_DESC: "My Customized Universal Blue Image"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"  # Put your own image here for a fancy profile on https://artifacthub.io/!
  IMAGE_NAME: "bazzite_zone"  # output image name, usually same as repo name
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

jobs:
  precheck:
    name: Check for source changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      base_image_digest: ${{ steps.check.outputs.base_image_digest }}
      openzotac_sha: ${{ steps.check.outputs.openzotac_sha }}
      elektrocoder_sha256: ${{ steps.check.outputs.elektrocoder_sha256 }}
      coolercontrol_url: ${{ steps.check.outputs.coolercontrol_url }}
      source_fingerprint: ${{ steps.check.outputs.source_fingerprint }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check whether a scheduled rebuild is needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_REPO="${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME,,}"
          BASE_IMAGE_REPO="ublue-os/bazzite-deck"
          BASE_IMAGE_TAG="stable"

          mark_build_required() {
            local reason="$1"

            echo "${reason}"
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            echo "base_image_digest=" >> "${GITHUB_OUTPUT}"
            echo "openzotac_sha=" >> "${GITHUB_OUTPUT}"
            echo "elektrocoder_sha256=" >> "${GITHUB_OUTPUT}"
            echo "coolercontrol_url=" >> "${GITHUB_OUTPUT}"
            echo "source_fingerprint=" >> "${GITHUB_OUTPUT}"
            exit 0
          }

          get_registry_token() {
            local repo="$1"
            local auth="${2:-}"

            if [[ -n "${auth}" ]]; then
              curl -fsSL \
                -u "${GITHUB_ACTOR}:${auth}" \
                "https://ghcr.io/token?service=ghcr.io&scope=repository:${repo}:pull" \
                | jq -r '.token'
            else
              curl -fsSL \
                "https://ghcr.io/token?service=ghcr.io&scope=repository:${repo}:pull" \
                | jq -r '.token'
            fi
          }

          get_manifest_digest() {
            local repo="$1"
            local ref="$2"
            local token="$3"

            curl -fsSI \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${repo}/manifests/${ref}" \
              | tr -d '\r' \
              | awk -F': ' 'tolower($1) == "docker-content-digest" {print $2}'
          }

          get_image_label() {
            local repo="$1"
            local ref="$2"
            local token="$3"
            local label_name="$4"
            local manifest config_digest

            manifest="$(curl -fsSL \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${repo}/manifests/${ref}")"
            config_digest="$(jq -r '.config.digest // empty' <<< "${manifest}")"

            if [[ -z "${config_digest}" ]]; then
              return 1
            fi

            curl -fsSL \
              -H "Authorization: Bearer ${token}" \
              "https://ghcr.io/v2/${repo}/blobs/${config_digest}" \
              | jq -r --arg label_name "${label_name}" '.config.Labels[$label_name] // empty'
          }

          if [[ "${GITHUB_EVENT_NAME}" != "schedule" ]]; then
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            echo "base_image_digest=" >> "${GITHUB_OUTPUT}"
            echo "openzotac_sha=" >> "${GITHUB_OUTPUT}"
            echo "elektrocoder_sha256=" >> "${GITHUB_OUTPUT}"
            echo "coolercontrol_url=" >> "${GITHUB_OUTPUT}"
            echo "source_fingerprint=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          OPENZONE_RAW="$(sed -n 's/^OPENZONE_RAW="\(.*\)"$/\1/p' build_files/build-modules.sh)"
          ELEKTROCODER_RAW="$(sed -n 's/^ELEKTROCODER_RAW="\(.*\)"$/\1/p' build_files/build-modules.sh)"
          COOLERCONTROL_VERSION="$(sed -n 's/^COOLERCONTROL_VERSION="\(.*\)"$/\1/p' build_files/build-modules.sh)"
          COOLERCONTROL_URL="https://gitlab.com/coolercontrol/coolercontrol/-/releases/${COOLERCONTROL_VERSION}/downloads/packages/CoolerControlD-x86_64.AppImage"

          OPENZOTAC_SHA="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/OpenZotacZone/ZotacZone-Drivers/commits/main" \
            | jq -r '.sha')" || mark_build_required "Unable to resolve the latest OpenZotac commit; continuing with a build."
          ELEKTROCODER_SHA256="$(curl -fsSL "${ELEKTROCODER_RAW}/zotac-zone-platform.c" | sha256sum | awk '{print $1}')" || mark_build_required "Unable to hash the ElektroCoder source; continuing with a build."
          BASE_IMAGE_TOKEN="$(get_registry_token "${BASE_IMAGE_REPO}")" || mark_build_required "Unable to authenticate to GHCR for the base image; continuing with a build."
          BASE_IMAGE_DIGEST="$(get_manifest_digest "${BASE_IMAGE_REPO}" "${BASE_IMAGE_TAG}" "${BASE_IMAGE_TOKEN}")" || mark_build_required "Unable to resolve the base image digest; continuing with a build."

          SOURCE_FINGERPRINT="$(printf '%s\n' \
            "repo_sha=${GITHUB_SHA}" \
            "openzotac_raw=${OPENZONE_RAW}" \
            "openzotac_sha=${OPENZOTAC_SHA}" \
            "elektrocoder_raw=${ELEKTROCODER_RAW}" \
            "elektrocoder_sha256=${ELEKTROCODER_SHA256}" \
            "coolercontrol_url=${COOLERCONTROL_URL}" \
            "base_image=${BASE_IMAGE_REPO}:${BASE_IMAGE_TAG}@${BASE_IMAGE_DIGEST}" \
            | sha256sum | awk '{print $1}')"

          IMAGE_TOKEN="$(get_registry_token "${IMAGE_REPO}" "${GH_TOKEN}")" || mark_build_required "Unable to inspect the current published image; continuing with a build."
          CURRENT_FINGERPRINT=""

          if CURRENT_FINGERPRINT="$(get_image_label "${IMAGE_REPO}" "${DEFAULT_TAG}" "${IMAGE_TOKEN}" "io.github.bazzite-zone.source-fingerprint" 2>/dev/null)"; then
            :
          else
            CURRENT_FINGERPRINT=""
          fi

          if [[ -n "${CURRENT_FINGERPRINT}" && "${CURRENT_FINGERPRINT}" == "${SOURCE_FINGERPRINT}" ]]; then
            echo "No source changes detected for the scheduled build."
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Source changes detected or no previous image metadata found."
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          fi

          echo "base_image_digest=${BASE_IMAGE_DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "openzotac_sha=${OPENZOTAC_SHA}" >> "${GITHUB_OUTPUT}"
          echo "elektrocoder_sha256=${ELEKTROCODER_SHA256}" >> "${GITHUB_OUTPUT}"
          echo "coolercontrol_url=${COOLERCONTROL_URL}" >> "${GITHUB_OUTPUT}"
          echo "source_fingerprint=${SOURCE_FINGERPRINT}" >> "${GITHUB_OUTPUT}"

  build_push:
    name: Build and push image
    needs: precheck
    if: needs.precheck.outputs.should_build == 'true'
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Prepare build labels
        run: |
          {
            echo 'CUSTOM_LABELS<<EOF'
            echo "io.github.bazzite-zone.repo-sha=${GITHUB_SHA}"
            echo "io.github.bazzite-zone.workflow-run-id=${GITHUB_RUN_ID}"
            if [[ -n "${{ needs.precheck.outputs.base_image_digest }}" ]]; then
              echo "io.github.bazzite-zone.base-image-digest=${{ needs.precheck.outputs.base_image_digest }}"
            fi
            if [[ -n "${{ needs.precheck.outputs.openzotac_sha }}" ]]; then
              echo "io.github.bazzite-zone.openzotac-sha=${{ needs.precheck.outputs.openzotac_sha }}"
            fi
            if [[ -n "${{ needs.precheck.outputs.elektrocoder_sha256 }}" ]]; then
              echo "io.github.bazzite-zone.elektrocoder-sha256=${{ needs.precheck.outputs.elektrocoder_sha256 }}"
            fi
            if [[ -n "${{ needs.precheck.outputs.coolercontrol_url }}" ]]; then
              echo "io.github.bazzite-zone.coolercontrol-url=${{ needs.precheck.outputs.coolercontrol_url }}"
            fi
            if [[ -n "${{ needs.precheck.outputs.source_fingerprint }}" ]]; then
              echo "io.github.bazzite-zone.source-fingerprint=${{ needs.precheck.outputs.source_fingerprint }}"
            fi
            echo 'EOF'
          } >> "${GITHUB_ENV}"

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # This is optional, but if you see that your builds are way too big for the runners, you can enable this by uncommenting the following lines:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      # Image metadata for https://artifacthub.io/ - This is optional but is highly recommended so we all can get a index of all the custom images
      # The metadata by itself is not going to do anything, you choose if you want your image to be on ArtifactHub or not.
      - name: Image Metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: metadata
        with:
          # This generates all the tags for your image, you can add custom tags here too!
          # Default tags are "$DEFAULT_TAG" and "$DEFAULT_TAG.$date".
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Prepare Secure Boot signing inputs
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" && "${{ github.ref }}" == "refs/heads/${{ github.event.repository.default_branch }}" ]]; then
            if [[ -z "${{ secrets.SECUREBOOT_MOK_KEY }}" || -z "${{ secrets.SECUREBOOT_MOK_CERT }}" ]]; then
              echo "SECUREBOOT_MOK_KEY and SECUREBOOT_MOK_CERT must be configured for release builds." >&2
              exit 1
            fi

            echo "SECUREBOOT_MOK_KEY_B64=$(printf '%s' '${{ secrets.SECUREBOOT_MOK_KEY }}' | base64 -w0)" >> "${GITHUB_ENV}"
            echo "SECUREBOOT_MOK_CERT_B64=$(printf '%s' '${{ secrets.SECUREBOOT_MOK_CERT }}' | base64 -w0)" >> "${GITHUB_ENV}"
          else
            echo "SECUREBOOT_MOK_KEY_B64=" >> "${GITHUB_ENV}"
            echo "SECUREBOOT_MOK_CERT_B64=" >> "${GITHUB_ENV}"
          fi

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          # Postfix image name with -custom to make it a little more descriptive
          # Syntax: https://docs.github.com/en/actions/learn-github-actions/expressions#format
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          build-args: |
            SECUREBOOT_MOK_KEY_B64=${{ env.SECUREBOOT_MOK_KEY_B64 }}
            SECUREBOOT_MOK_CERT_B64=${{ env.SECUREBOOT_MOK_CERT_B64 }}
          labels: |
            ${{ steps.metadata.outputs.labels }}
            ${{ env.CUSTOM_LABELS }}
          oci: false

      # Rechunk is a script that we use on Universal Blue to make sure there isnt a single huge layer when your image gets published.
      # This does not make your image faster to download, just provides better resumability and fixes a few errors.
      # Documentation for Rechunk is provided on their github repository at https://github.com/hhd-dev/rechunk
      # You can enable it by uncommenting the following lines:
      # - name: Run Rechunker
      #   id: rechunk
      #   uses: ublue-os/legacy-rechunk@a925083d9af7cb04b3e2a6e8c01bfa495f38b710 # v1.0.0
      #   with:
      #     rechunk: 'ghcr.io/ublue-os/legacy-rechunk:v1.0.0-x86_64'
      #     ref: "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
      #     prev-ref: "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
      #     skip_compression: true
      #     version: ${{ env.CENTOS_VERSION }}
      #     labels: ${{ steps.metadata.outputs.labels }} # Rechunk strips out all the labels during build, this needs to be reapplied here with newline separator

      # This is necessary so that the podman socket can find the rechunked image on its storage
      # - name: Load in podman and tag
      #   run: |
      #     IMAGE=$(podman pull ${{ steps.rechunk.outputs.ref }})
      #     sudo rm -rf ${{ steps.rechunk.outputs.output }}
      #     for tag in ${{ steps.metadata.outputs.tags }}; do
      #       podman tag $IMAGE ${{ env.IMAGE_NAME }}:$tag
      #     done

      # These `if` statements are so that pull requests for your custom images do not make it publish any packages under your name without you knowing
      # They also check if the runner is on the default branch so that things like the merge queue (if you enable it), are going to work
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      # This section is optional and only needs to be enabled if you plan on distributing
      # your project for others to consume. You will need to create a public and private key
      # using Cosign and save the private key as a repository secret in Github for this workflow
      # to consume. For more details, review the image signing section of the README.
      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: 'v2.6.1'

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          DIGEST="${{ steps.push.outputs.digest }}"
          IMAGES=""

          for tag in ${{ steps.metadata.outputs.tags }}; do
            IMAGES+="$IMAGE_FULL:$tag@$DIGEST "
          done

          cosign sign -y --key env://COSIGN_PRIVATE_KEY $IMAGES
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
